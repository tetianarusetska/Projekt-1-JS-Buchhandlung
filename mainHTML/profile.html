<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="/stylesCSS/root.css">

    <script src="/JS/search.js" defer></script>
    <title>Profile Page</title>
</head>

<body>
    <!------------------------ HEADER --------------------------->
    <header>

        <div><a href="index.html"><img class="logo" src="/assets/logo/screenshots/newversion5.png" alt="logo"></a></div>
        <div class="menuAndSearch">
            <nav class="menu1">
                <ul>
                    <li><a href="index.html">HOME<svg class="down-arrow" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="1">
                                <path d="M6 9l6 6 6-6" />
                            </svg></a></li>
                    <li><a href="#about-Shop">ÜBER UNS<svg class="down-arrow" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="1">
                                <path d="M6 9l6 6 6-6" />
                            </svg></a></li>
                    <li><a href="#allBooks">SHOP<svg class="down-arrow" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="1">
                                <path d="M6 9l6 6 6-6" />
                            </svg></a></li>
                    <li><a href="#">KONTAKT<svg class="down-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="1">
                                <path d="M6 9l6 6 6-6" />
                            </svg></a></li>
                    <li><img class="icon4" id="searchIcon" src="/assets/icons/search3.svg" alt="icon4"></li>
                </ul>
            </nav>
            <div id="searchContainer" class="search">
                <input type="search">
            </div>
        </div>

        <div class="icons">
            <a href="favorites.html"><img class="icon2" src="/assets/icons/heart.svg" alt="icon2"></a>
            <a href="profile.html"><img class="icon1" src="/assets/icons/profile2.svg" alt="icon1"></a>
            <a href="cart.html"><img class="icon3" src="/assets/icons/basket.png" alt="icon4"></a>
        </div>

    </header>
    <!------------------------ MAIN --------------------------->
    <main>
        <section id="profilePage" class="profileWrapper">
            <div class="profilePage">
                <div class="login">
                    <label for="email">Email</label>
                    <input type="email" name="email" id="emailInput" class="email">

                    <label for="password">Passwort</label>
                    <input type="password" name="password" id="passwordInput" class="password">

                    <button type="button" id="loginButton" class="login-Button">Anmelden</button>
                </div>
                <p>oder</p>
                <button type="button" id="registrButton" class="registr-Button">Registrieren</button>
            </div>
            <p id="message" class="messages"></p>
        </section>

        <section id="registration" class="hidden registr">
            <form id="registrationForm" class="form">
                <label for="nameInput">Vorname, Nachname</label>
                <input type="text" name="nameInput" id="nameInput">
                <label for="r-emailInput">E-Mail</label>
                <input type="email" name="r-emailInput" id="r-emailInput">
                <label for="r-passwordInput">Passwort</label>
                <input type="password" name="r-passwordInput" id="r-passwordInput">
                <label for="r-passwordInput2">Passwort wiederholen</label>
                <input type="password" name="r-passwordInput2" id="r-passwordInput2">
                <button type="submit" id="registrationButton">Registrieren</button>
            </form>
            <p id="r-message"></p>
        </section>

        <section id="profile" class="hidden prof">
            <div id="profile-content" class="profileContent">
                <p class="profTitel">Profil</p>
                <p class="profWillkommen">Willkommen in Ihrem persönlichen Kundenkonto.<br>Hier finden Sie eine
                    Übersicht Ihrer Bestellungen.</p>
                <p class="profOrders">Meine Bestellungen<svg class="down-arrow" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="1">
                        <path d="M6 9l6 6 6-6" />
                    </svg></p>
                <p class="profList">Mein Merkzettel<svg class="down-arrow" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="1">
                        <path d="M6 9l6 6 6-6" />
                    </svg></p>
            </div>
        </section>
    </main>
<!------------------------ FOOTER --------------------------->
    <footer>
        <div>
            <ul class="profileFooter">
                <li><a href="impressum.html">Impressum</a></li>
                <li><a href="datenschutz.html">Datenschutz</a></li>

            </ul>

    </footer>

</html>
